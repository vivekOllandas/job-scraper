<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Listings Dashboard</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --border: #2a2e37;
    --text: #e8e8ea;
    --muted: #9a9ea8;
    --accent: #6ea8fe;
    --indeed: #2557a7;
    --naukri: #4a90d9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  header { max-width: 900px; margin: 0 auto 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  #meta { color: var(--muted); font-size: 0.9rem; }
  #controls {
    max-width: 900px; margin: 0 auto 20px; display: flex; gap: 8px; flex-wrap: wrap;
  }
  input, select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 0.9rem;
  }
  #jobs { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .job {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px;
  }
  .job-top { display: flex; justify-content: space-between; align-items: start; gap: 8px; }
  .job-title { font-size: 1.05rem; font-weight: 600; }
  .job-title a { color: var(--text); text-decoration: none; }
  .job-title a:hover { color: var(--accent); }
  .badge {
    font-size: 0.7rem; padding: 3px 8px; border-radius: 999px; white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.02em;
  }
  .badge.indeed { background: var(--indeed); color: white; }
  .badge.naukri { background: var(--naukri); color: white; }
  .job-company { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
  .job-summary { color: var(--muted); font-size: 0.85rem; margin-top: 8px; line-height: 1.4; }
  #empty { color: var(--muted); text-align: center; margin-top: 60px; }
</style>
</head>
<body>
  <header>
    <h1>Job Listings</h1>
    <div id="meta">Loading…</div>
  </header>

  <div id="controls">
    <input id="search" type="text" placeholder="Filter by keyword…" />
    <select id="sourceFilter">
      <option value="">All sources</option>
      <option value="indeed">Indeed</option>
      <option value="naukri">Naukri</option>
    </select>
  </div>

  <div id="jobs"></div>
  <div id="empty" style="display:none;">No jobs found yet. The first scheduled run will populate this.</div>

  <script>
    let allJobs = [];

    async function loadJobs() {
      try {
        const res = await fetch(
          'https://raw.githubusercontent.com/vivekOllandas/job-scraper/main/docs/jobs.json?_=' + Date.now()
        );
        if (!res.ok) throw new Error('jobs.json not found yet');
        const data = await res.json();
        allJobs = data.jobs || [];
        document.getElementById('meta').textContent =
          `${data.count || 0} jobs · last updated ${data.lastUpdated ? new Date(data.lastUpdated).toLocaleString() : 'never'}`;
        render();
      } catch (e) {
        document.getElementById('meta').textContent = 'No data yet — waiting for first scrape run.';
        document.getElementById('empty').style.display = 'block';
      }
    }

    function render() {
      const query = document.getElementById('search').value.toLowerCase();
      const source = document.getElementById('sourceFilter').value;

      const filtered = allJobs.filter(j => {
        const matchesQuery = !query ||
          j.title.toLowerCase().includes(query) ||
          j.company.toLowerCase().includes(query);
        const matchesSource = !source || j.source === source;
        return matchesQuery && matchesSource;
      });

      const container = document.getElementById('jobs');
      container.innerHTML = '';

      document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';

      for (const job of filtered) {
        const div = document.createElement('div');
        div.className = 'job';
        div.innerHTML = `
          <div class="job-top">
            <div class="job-title"><a href="${job.link}" target="_blank" rel="noopener">${job.title}</a></div>
            <span class="badge ${job.source}">${job.source}</span>
          </div>
          <div class="job-company">${job.company} · ${job.location}</div>
          ${job.summary ? `<div class="job-summary">${job.summary}</div>` : ''}
        `;
        container.appendChild(div);
      }
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sourceFilter').addEventListener('change', render);

    loadJobs();
    setInterval(loadJobs, 5 * 60 * 1000);
  </script>
</body>
</html>
